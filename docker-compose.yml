version: '3.8'

services:
  # MySQL 数据库
  db:
    image: mysql:8.0
    container_name: beijingshanshan_db
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: ${DB_ROOT_PASSWORD:-rootpassword123}
      MYSQL_DATABASE: ${DB_NAME:-beijingshanshan}
      MYSQL_USER: ${DB_USER:-beijingshanshan}
      MYSQL_PASSWORD: ${DB_PASSWORD:-beijingshanshan123}
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
      - ./init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    command: --default-authentication-plugin=mysql_native_password --character-set-server=utf8mb4 --collation-server=utf8mb4_unicode_ci
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-p${DB_ROOT_PASSWORD:-rootpassword123}"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Redis 缓存
  redis:
    image: redis:7-alpine
    container_name: beijingshanshan_redis
    restart: always
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    command: redis-server --appendonly yes
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Django 后端
  backend:
    build:
      context: ./hszc-swimming-api
      dockerfile: Dockerfile
    container_name: beijingshanshan_backend
    restart: always
    ports:
      - "8000:8000"
    environment:
      - DJANGO_ENV=prod
      - DB_HOST=db
      - DB_PORT=3306
      - DB_NAME=${DB_NAME:-beijingshanshan}
      - DB_USER=${DB_USER:-beijingshanshan}
      - DB_PASSWORD=${DB_PASSWORD:-beijingshanshan123}
      - REDIS_URL=redis://redis:6379/0
      - SECRET_KEY=${SECRET_KEY:-your-secret-key-change-in-production}
      - ALLOWED_HOSTS=${ALLOWED_HOSTS:-*}
    volumes:
      - media_data:/app/media
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/api/v1/users/auth/login/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s

  # Vue 前端 + Nginx
  frontend:
    build:
      context: ./hszc-swimming-web
      dockerfile: Dockerfile
    container_name: beijingshanshan_frontend
    restart: always
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./hszc-swimming-web/nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - backend

volumes:
  mysql_data:
  redis_data:
  media_data:

networks:
  default:
    name: beijingshanshan_network
